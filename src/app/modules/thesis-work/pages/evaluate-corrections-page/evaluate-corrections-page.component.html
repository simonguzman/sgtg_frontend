<div class="w-full min-h-screen bg-[#F8F9FA] p-4 md:p-8">
  <div class="max-w-7xl mx-auto flex flex-col gap-6">
    <button (click)="goBack()" class="flex items-center gap-2 text-navy-900 font-bold group w-fit transition-opacity hover:opacity-80">
      <span class="material-symbols-outlined text-[#000066] text-xl transition-transform duration-300 ease-in-out group-hover:-translate-x-1.5">
        arrow_back
      </span>
      <span class="return-arrow-option">Regresar</span>
    </button>
    @if (thesisWorkState()) {
      <app-evaluate-corrections-form
        [thesisWork]="thesisWorkState()!"
        [isSubmitting]="isSubmitting()"
        (onSubmitEvaluation)="handleOpenConfirmation($event)"
        (onGoBack)="goBack()">
      </app-evaluate-corrections-form>
    }

    <app-confirmation-action-modal
      [isOpen]="isConfirmModalOpen()"
      description="¿Está seguro de enviar esta evaluación? Al confirmar, el veredicto pasará a estado oficial e inmutable en el sistema de trabajos de grado y se notificará a las partes."
      (onClose)="isConfirmModalOpen.set(false)"
      (confirm)="executeEvaluationSave()">
    </app-confirmation-action-modal>
  </div>
</div>
