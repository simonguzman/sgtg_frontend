<div class="pt-2 max-w-5xl mx-auto pb-10">
  <div class="flex justify-between items-center mb-6">
    <button (click)="goBack()" class="flex items-center gap-2 text-navy-900 hover:text-navy-700 transition-colors font-bold group">
      <span class="material-symbols-outlined text-[#000066] text-lg group-hover:-translate-x-1 transition-transform">
        arrow_back
      </span>
      <span class="return-arrow-option">Regresar</span>
    </button>
  </div>

  @if (!thesisWorkDetails()) {
    <div class="text-center text-[#777680] font-display my-10">
      Cargando historial de formatos y estructura general...
    </div>
  } @else {
    <!-- ✅ (onSave) ahora llama a handleRequestConfirmation en lugar de handleCorrespondenceSave -->
    <app-register-correspondence-form
      [thesisWork]="thesisWorkDetails()!"
      [isSubmitting]="isSubmitting()"
      (onSave)="handleRequestConfirmation($event)"
      (onGoBack)="goBack()">
    </app-register-correspondence-form>
  }
</div>

<!-- ✅ Modal de confirmación -->
<app-confirmation-action-modal
  [isOpen]="isConfirmModalOpen()"
  description="¿Está seguro de registrar la correspondencia y finalizar el proceso del trabajo de grado? Esta acción cerrará formalmente el expediente académico y no podrá deshacerse."
  (onClose)="isConfirmModalOpen.set(false)"
  (confirm)="processCorrespondence()">
</app-confirmation-action-modal>
