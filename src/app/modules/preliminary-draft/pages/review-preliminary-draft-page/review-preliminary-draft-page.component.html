<div class="w-full max-w-5xl mx-auto p-4 md:p-8 bg-[#F8F9FA] min-h-screen">

  <div class="mb-4">
    <button
      (click)="goBack()"
      class="flex items-center gap-2 text-navy-900 hover:text-[#000066] transition-colors font-bold group"
    >
      <span class="material-symbols-outlined text-[#000066] font-semibold text-size-sidebar-title font-display group-hover:-translate-x-1 transition-transform">
        arrow_back
      </span>
      <span class="return-arrow-option">Regresar</span>
    </button>
  </div>

  @if (preliminaryDraftState()) {
    <app-review-preliminary-draft-form
      [preliminaryDraft]="preliminaryDraftState()!"
      (onSaveEvaluation)="handleRequestConfirmation($event)"
      (onDownloadPreliminaryDraft)="downloadCurrentDocument()">
    </app-review-preliminary-draft-form>
  }

</div>

<app-confirmation-action-modal
  [isOpen]="isConfirmModalOpen()"
  description="¿Desea finalizar la evaluación? El resultado será enviado al sistema."
  (onClose)="isConfirmModalOpen.set(false)"
  (confirm)="processEvaluation()">
</app-confirmation-action-modal>
