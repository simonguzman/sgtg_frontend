<div class="w-full max-w-5xl mx-auto p-4 md:p-8 bg-[#F8F9FA] min-h-screen">

  <div class="mb-6">
    <button
      (click)="goBack()"
      class="flex items-center gap-2 text-navy-900 hover:text-navy-700 transition-colors font-bold group"
    >
      <span class="material-symbols-outlined text-[#000066] text-lg group-hover:-translate-x-1 transition-transform">
        arrow_back
      </span>
      <span class="return-arrow-option">Regresar</span>
    </button>
  </div>

  <!-- AÑADIDO: Banner informativo para edición -->
  <app-info-banner title="Edición de anteproyecto" class="mb-8 block">
    Puede modificar la información básica y actualizar los archivos asociados al anteproyecto. Asegúrese de guardar los cambios al finalizar para que sean reflejados en el sistema.
  </app-info-banner>

  @if (preliminaryDraftToEdit()) {
    <app-preliminary-draft-form
      [preliminaryDraft]="preliminaryDraftToEdit()"
      (onSave)="handleUpdate($event)"
    ></app-preliminary-draft-form>
  } @else {
    <div class="flex flex-col items-center justify-center p-20 bg-white rounded-lg border border-dashed border-gray-300">
      <span class="material-symbols-outlined text-4xl text-[#777680] animate-spin">sync</span>
      <p class="mt-2 text-[#777680]">Cargando anteproyecto...</p>
    </div>
  }

</div>

<app-confirmation-action-modal
  [isOpen]="confirmState().isOpen"
  description="¿Está seguro de guardar los cambios realizados en este anteproyecto?"
  (onClose)="cancelUpdate()"
  (confirm)="confirmUpdate()"
></app-confirmation-action-modal>
