<div class="w-full">
  <div class="bg-white rounded-lg shadow-sm p-6">

    <div class="mb-6">
      <button (click)="goBack()" class="flex items-center gap-2 text-navy-900 font-bold group w-fit">
        <span class="material-symbols-outlined text-[#000066] text-lg group-hover:-translate-x-1 transition-transform">
          arrow_back
        </span>
        <span class="return-arrow-option">Regresar</span>
      </button>
    </div>

    <app-tabs
      [tabs]="tabs"
      [activeTab]="activeTab()"
      (tabChange)="activeTab.set($event)"
    ></app-tabs>

    <div class="mt-6">
      <app-table-component
        [value]="currentTableData()"
        [columns]="currentColumns()"
        [paginator]="true"
        [headerButtons]="currentHeaderButtons()"
        (headerButtonClick)="handleHeaderButton($event)"
        (actionClick)="handleTableAction($event)"
        [emptyMessage]="activeTab() === 'ANTEPROYECTOS'
          ? 'No han sido registrados documentos de anteproyecto en el sistema'
          : 'No hay presentaciones registradas para este anteproyecto'"
      ></app-table-component>
    </div>

  </div>
</div>

<app-file-upload-modal
  [isOpen]="isUploadModalOpen()"
  [description]="activeTab() === 'ANTEPROYECTOS'
    ? 'Seleccione el archivo PDF del anteproyecto'
    : 'Seleccione el archivo PDF de la presentación'"
  [uploadedBy]="activeTab() === 'ANTEPROYECTOS' ? 'Estudiante' : 'Jefe de Departamento'"
  (onFileUploaded)="onFileSelected($event)"
  (onClose)="isUploadModalOpen.set(false)"
></app-file-upload-modal>

<app-confirmation-action-modal
  [isOpen]="isConfirmModalOpen()"
  [description]="activeTab() === 'ANTEPROYECTOS'
    ? '¿Está seguro de cargar este anteproyecto? El estado cambiará a \'En revisión\'.'
    : '¿Está seguro de cargar esta presentación al consejo?'"
  (confirm)="confirmUpload()"
  (onClose)="cancelUpload()"
></app-confirmation-action-modal>
