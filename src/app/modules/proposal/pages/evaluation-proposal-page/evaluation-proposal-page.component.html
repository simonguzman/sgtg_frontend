@if (proposal(); as data) {
  <app-evaluation-proposal-form
    [proposal]="data"
    (onDownloadOriginal)="downloadOriginalDocument()"
    (onSaveEvaluation)="handleSaveEvaluation($event)"
    (onGoBack)="goBack()">
  </app-evaluation-proposal-form>
} @else {
  <div class="text-center text-[#777680] my-10 font-display">
    Cargando información de la propuesta...
  </div>
}
